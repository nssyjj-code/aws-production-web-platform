<svg width="100%" viewBox="0 0 680 740" role="img" xmlns="http://www.w3.org/2000/svg">
<title>AWS Production Web Platform Architecture</title>
<desc>Three-tier AWS architecture diagram showing VPC with two availability zones, public subnets with NAT gateways, private app subnets with EC2 auto scaling group, and private database subnets with Aurora MySQL.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .th { font-size: 13px; font-weight: 600; fill: #24292f; }
    .ts { font-size: 11px; font-weight: 400; fill: #57606a; }
    .arr { stroke: #57606a; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
</defs>

<!-- Internet -->
<rect x="275" y="14" width="130" height="38" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text class="th" x="340" y="38" text-anchor="middle">Internet</text>

<!-- Arrow: Internet -> ALB -->
<line x1="340" y1="52" x2="340" y2="78" stroke="#0969da" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- ALB -->
<rect x="200" y="78" width="280" height="50" rx="8" fill="#ddf4ff" stroke="#54aeff" stroke-width="1"/>
<text class="th" x="340" y="99" text-anchor="middle">Application Load Balancer</text>
<text class="ts" x="340" y="117" text-anchor="middle">Internet-facing · HTTP :80</text>

<!-- VPC boundary -->
<rect x="22" y="144" width="636" height="560" rx="16" fill="none" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="38" y="164" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1a7f37">VPC  10.0.0.0/16</text>

<!-- AZ labels -->
<text x="50" y="192" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0969da">Availability Zone A</text>
<text x="362" y="192" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#0969da">Availability Zone B</text>

<!-- AZ boundaries -->
<rect x="36" y="198" width="296" height="490" rx="10" fill="none" stroke="#54aeff" stroke-width="0.8" stroke-dasharray="4 3"/>
<rect x="348" y="198" width="296" height="490" rx="10" fill="none" stroke="#54aeff" stroke-width="0.8" stroke-dasharray="4 3"/>

<!-- Public Subnet A -->
<rect x="50" y="212" width="268" height="96" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1"/>
<text class="th" x="184" y="232" text-anchor="middle">Public Subnet A  ·  10.0.1.0/24</text>
<rect x="66" y="244" width="110" height="34" rx="6" fill="#fff" stroke="#2da44e" stroke-width="0.8"/>
<text class="th" x="121" y="265" text-anchor="middle">NAT Gateway A</text>
<rect x="192" y="244" width="110" height="34" rx="6" fill="#fff" stroke="#8c959f" stroke-width="0.8"/>
<text class="th" x="247" y="265" text-anchor="middle">Elastic IP</text>

<!-- Public Subnet B -->
<rect x="362" y="212" width="268" height="96" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1"/>
<text class="th" x="496" y="232" text-anchor="middle">Public Subnet B  ·  10.0.2.0/24</text>
<rect x="378" y="244" width="110" height="34" rx="6" fill="#fff" stroke="#2da44e" stroke-width="0.8"/>
<text class="th" x="433" y="265" text-anchor="middle">NAT Gateway B</text>
<rect x="504" y="244" width="110" height="34" rx="6" fill="#fff" stroke="#8c959f" stroke-width="0.8"/>
<text class="th" x="559" y="265" text-anchor="middle">Elastic IP</text>

<!-- ALB -> Target Group -->
<line x1="340" y1="128" x2="340" y2="348" stroke="#0969da" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Target Group -->
<rect x="264" y="348" width="152" height="46" rx="8" fill="#ddf4ff" stroke="#54aeff" stroke-width="1"/>
<text class="th" x="340" y="367" text-anchor="middle">Target Group</text>
<text class="ts" x="340" y="383" text-anchor="middle">HTTP :80</text>

<!-- Private App Subnet A -->
<rect x="50" y="334" width="268" height="136" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1"/>
<text class="th" x="184" y="354" text-anchor="middle">Private App Subnet A  ·  10.0.3.0/24</text>
<text x="184" y="373" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#6e40c9" text-anchor="middle">Auto Scaling Group</text>
<rect x="56" y="378" width="252" height="80" rx="6" fill="none" stroke="#bf8700" stroke-width="1" stroke-dasharray="4 3"/>
<rect x="68" y="390" width="104" height="56" rx="6" fill="#fff8c5" stroke="#bf8700" stroke-width="0.8"/>
<text class="th" x="120" y="414" text-anchor="middle" fill="#7d4e00">EC2 Instance</text>
<rect x="190" y="390" width="104" height="56" rx="6" fill="#fff8c5" stroke="#bf8700" stroke-width="0.8"/>
<text class="th" x="242" y="414" text-anchor="middle" fill="#7d4e00">EC2 Instance</text>

<!-- Private App Subnet B -->
<rect x="362" y="334" width="268" height="136" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1"/>
<text class="th" x="496" y="354" text-anchor="middle">Private App Subnet B  ·  10.0.4.0/24</text>
<text x="496" y="373" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#6e40c9" text-anchor="middle">Auto Scaling Group</text>
<rect x="368" y="378" width="252" height="80" rx="6" fill="none" stroke="#bf8700" stroke-width="1" stroke-dasharray="4 3"/>
<rect x="380" y="390" width="104" height="56" rx="6" fill="#fff8c5" stroke="#bf8700" stroke-width="0.8"/>
<text class="th" x="432" y="414" text-anchor="middle" fill="#7d4e00">EC2 Instance</text>
<rect x="502" y="390" width="104" height="56" rx="6" fill="#fff8c5" stroke="#bf8700" stroke-width="0.8"/>
<text class="th" x="554" y="414" text-anchor="middle" fill="#7d4e00">EC2 Instance</text>

<!-- Target Group -> App Subnets -->
<path d="M288 371 L184 371 L184 390" fill="none" stroke="#8250df" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M392 371 L496 371 L496 390" fill="none" stroke="#8250df" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Private DB Subnet A -->
<rect x="50" y="512" width="268" height="108" rx="8" fill="#fff0eb" stroke="#bc4c00" stroke-width="1"/>
<text class="th" x="184" y="532" text-anchor="middle">Private DB Subnet A  ·  10.0.5.0/24</text>
<rect x="76" y="546" width="216" height="58" rx="6" fill="#fff" stroke="#bc4c00" stroke-width="0.8"/>
<text class="th" x="184" y="568" text-anchor="middle">Aurora MySQL</text>
<text class="ts" x="184" y="584" text-anchor="middle">Primary writer</text>

<!-- Private DB Subnet B -->
<rect x="362" y="512" width="268" height="108" rx="8" fill="#fff0eb" stroke="#bc4c00" stroke-width="1"/>
<text class="th" x="496" y="532" text-anchor="middle">Private DB Subnet B  ·  10.0.6.0/24</text>
<rect x="388" y="546" width="216" height="58" rx="6" fill="#fff" stroke="#bc4c00" stroke-width="0.8"/>
<text class="th" x="496" y="568" text-anchor="middle">Aurora MySQL</text>
<text class="ts" x="496" y="584" text-anchor="middle">Reader replica</text>

<!-- Aurora replication -->
<path d="M292 570 L388 570" fill="none" stroke="#bc4c00" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="563" text-anchor="middle">Replication</text>

<!-- App -> DB -->
<line x1="184" y1="470" x2="184" y2="546" stroke="#bc4c00" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="496" y1="470" x2="496" y2="546" stroke="#bc4c00" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- Outbound via NAT -->
<path d="M121 244 L121 228 L184 228 L184 212" fill="none" stroke="#1a7f37" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M433 244 L433 228 L496 228 L496 212" fill="none" stroke="#1a7f37" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- S3 -->
<rect x="246" y="636" width="188" height="50" rx="8" fill="#e6f4ea" stroke="#1a7f37" stroke-width="1"/>
<text class="th" x="340" y="657" text-anchor="middle">Amazon S3</text>
<text class="ts" x="340" y="673" text-anchor="middle">Assets and logs</text>

<!-- EC2 -> S3 -->
<path d="M184 470 L184 656 L246 661" fill="none" stroke="#1a7f37" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M496 470 L496 656 L434 661" fill="none" stroke="#1a7f37" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<line x1="36" y1="714" x2="56" y2="714" stroke="#0969da" stroke-width="1.5"/>
<text class="ts" x="62" y="718">Traffic flow</text>
<line x1="152" y1="714" x2="172" y2="714" stroke="#bc4c00" stroke-width="1" stroke-dasharray="5 3"/>
<text class="ts" x="178" y="718">Replication</text>
<line x1="268" y1="714" x2="288" y2="714" stroke="#1a7f37" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="294" y="718">Outbound internet</text>
<rect x="420" y="708" width="12" height="12" rx="2" fill="none" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="438" y="718">VPC boundary</text>
<rect x="546" y="708" width="12" height="12" rx="2" fill="none" stroke="#54aeff" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="564" y="718">AZ boundary</text>
</svg>
